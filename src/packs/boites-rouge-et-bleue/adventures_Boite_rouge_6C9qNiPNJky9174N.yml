journal:
  - folder: mzBsD4FM83eRyFPG
    name: l’Albergo
    _id: I0jLQRFpKZfhQLRM
    pages:
      - sort: 100000
        name: Hall
        type: text
        _id: YBwBQGWid5JtF5Nq
        system: {}
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: >-
            <p>Un grand vestibule tout en longueur. Le parquet est en chêne
            massif.</p><p>Les murs sont recouverts de lambris de bois noir qui
            assombrissent considérablement la pièce. L’escalier, lui aussi en
            bois, est une superbe pièce Art nouveau dont la rampe en fer forgé
            reproduit les ondulations de pampres de vigne. De nombreux cartons
            encombrent la pièce. Ils contiennent des affaires appartenant à
            Ludovic : de l’équipement de spéléologie (lampes-torches, sacs,
            piolets, cordes, etc.), ainsi que des couteaux de chasse. Oscar ne
            connaissait pas le goût de Ludovic pour ces activités…</p>
        video:
          controls: true
          volume: 0.5
        src: null
        category: null
        flags: {}
        _stats:
          compendiumSource: null
          duplicateSource: null
          exportSource: null
          coreVersion: '13.351'
          systemId: dangerousgary
          systemVersion: 1.1.1
          lastModifiedBy: null
        ownership:
          default: -1
      - sort: 200000
        name: Salon
        type: text
        _id: nWrOrVOZt7INgq3z
        system: {}
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: >-
            <p>Une vaste pièce lumineuse dominée au nord par une grande
            bow-window et au sud par une cheminée de marbre, dont le montant est
            sculpté de motifs végétaux. Un immense et confortable canapé vert
            sapin occupe le centre du salon. Les autres meubles sont de style
            Empire. Les murs sont décorés de tableaux peints par Ludovic,
            représentant des paysages de la côte.</p>
        video:
          controls: true
          volume: 0.5
        src: null
        category: null
        flags: {}
        _stats:
          compendiumSource: null
          duplicateSource: null
          exportSource: null
          coreVersion: '13.351'
          systemId: dangerousgary
          systemVersion: 1.1.1
          lastModifiedBy: null
        ownership:
          default: -1
      - sort: 300000
        name: Salle à manger
        type: text
        _id: YONBQ883keHzEuF5
        system: {}
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: >-
            <p>Une pièce assez semblable au salon. La table semble tout droit
            sortie d’une ferme normande. Des portraits d’individus anonymes du
            XIXe siècle sont accrochés aux murs.</p>
        video:
          controls: true
          volume: 0.5
        src: null
        category: null
        flags: {}
        _stats:
          compendiumSource: null
          duplicateSource: null
          exportSource: null
          coreVersion: '13.351'
          systemId: dangerousgary
          systemVersion: 1.1.1
          lastModifiedBy: null
        ownership:
          default: -1
      - sort: 400000
        name: Bibliothèque
        type: text
        _id: DnuxkgdFOmT6FnAu
        system: {}
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: >-
            <p>Certainement la plus belle pièce de la demeure. Les rayonnages en
            chêne mouluré ont l’âge de la maison et sont encore en très bon
            état. L’endroit est dans le plus grand désordre. Les livres traitent
            de nombreux sujets : architecture, histoire et folklore... On peut
            aussi y trouver quelques manuels de survie.</p>
        video:
          controls: true
          volume: 0.5
        src: null
        category: null
        flags: {}
        _stats:
          compendiumSource: null
          duplicateSource: null
          exportSource: null
          coreVersion: '13.351'
          systemId: dangerousgary
          systemVersion: 1.1.1
          lastModifiedBy: null
        ownership:
          default: -1
      - sort: 500000
        name: Cuisine
        type: text
        _id: PwlqSAK6WleQT9Mx
        system: {}
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: >-
            <p>Un espace rustique et très vétuste. Un grand meuble contient des
            conserves et des rations de survie, pour la plupart périmées. Un
            étroit escalier mène à la cave. </p><section class="secret"
            id="secret-0WKo26hjlf0bIQlN"><p>Le Passage s’ouvre au milieu des
            marches.</p></section><p></p>
        video:
          controls: true
          volume: 0.5
        src: null
        category: null
        flags: {}
        _stats:
          compendiumSource: null
          duplicateSource: null
          exportSource: null
          coreVersion: '13.351'
          systemId: dangerousgary
          systemVersion: 1.1.1
          lastModifiedBy: null
        ownership:
          default: -1
      - sort: 600000
        name: Chambre bleue
        type: text
        _id: VBAAInpRBKQcIg71
        system: {}
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: >-
            <p>La chambre de maître où s’est installé Oscar. La vue sur mer est
            à couper le souffle. Les murs sont recouverts d’une tapisserie
            anglaise bleue aux motifs végétaux. Le lit est métallique et peu
            confortable.</p><p>Une immense armoire normande occupe le mur ouest.
            Un étrange tableau signé par Ludovic est accroché en face du lit :
            il représente un labyrinthe unicursal (à un seul chemin) dont le
            centre est une serrure.</p>
        video:
          controls: true
          volume: 0.5
        src: null
        category: null
        flags: {}
        _stats:
          compendiumSource: null
          duplicateSource: null
          exportSource: null
          coreVersion: '13.351'
          systemId: dangerousgary
          systemVersion: 1.1.1
          lastModifiedBy: null
        ownership:
          default: -1
      - sort: 700000
        name: Chambre jaune
        type: text
        _id: SwRwm4zUdUeHclyF
        system: {}
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: >-
            <p>Une chambre décorée d’une tapisserie jaune, aux motifs passés par
            le soleil. Un meuble bas contient une vraie pharmacie : bandages,
            antibiotiques, attelles, etc.</p>
        video:
          controls: true
          volume: 0.5
        src: null
        category: null
        flags: {}
        _stats:
          compendiumSource: null
          duplicateSource: null
          exportSource: null
          coreVersion: '13.351'
