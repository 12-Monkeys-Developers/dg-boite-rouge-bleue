      - sort: 0
        name: Extérieur
        type: text
        _id: pufaiggDmSWDGlNd
        system: {}
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: >-
            <p>La propriété se situe sur les hauteurs d’Houlgate, au milieu des
            arbres, non loin de la falaise des Vaches noires. On y accède par un
            étroit chemin en pente. La vue sur la Manche est extraordinaire. La
            maison marie le style néo-normand avec son toit à pignon et ses
            parements de bois d’un vert tendre, et le style Art nouveau
            reconnaissable notamment aux formes arrondies et végétales des
            bow-windows. Le jardin n’est pas très grand et en friche : il n’est
            plus entretenu depuis des années. </p>
        video:
          controls: true
          volume: 0.5
        src: null
        category: null
        flags: {}
        _stats:
          compendiumSource: null
          duplicateSource: null
          exportSource: null
          coreVersion: '13.351'
