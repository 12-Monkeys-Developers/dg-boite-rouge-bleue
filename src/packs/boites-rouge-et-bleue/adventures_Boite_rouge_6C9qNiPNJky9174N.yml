      - sort: 1100000
        name: Cave
        type: text
        _id: XfAMp5lB0YpQa1I3
        system: {}
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: >-
            <p>Accessible de la cuisine, elle court sous une partie de la
            maison.</p><p>Basse de plafonds, elle est encombrée de caisses et de
            meubles démontés. L’ensemble est plongé dans la pénombre :
            l’éclairage électrique fonctionne mal.</p>
        video:
          controls: true
          volume: 0.5
        src: null
        category: null
        flags: {}
        _stats:
          compendiumSource: null
