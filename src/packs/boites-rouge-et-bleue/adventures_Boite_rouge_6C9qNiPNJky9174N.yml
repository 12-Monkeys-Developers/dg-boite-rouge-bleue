      - sort: 1200000
        name: Grenier
        type: text
        _id: 4fg0WqsRY3wiSuqu
        system: {}
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: >-
            <p>On y entre par une trappe située dans le hall du premier
            étage.</p><p>Il est entièrement vide.</p>
        video:
          controls: true
          volume: 0.5
        src: null
        category: null
