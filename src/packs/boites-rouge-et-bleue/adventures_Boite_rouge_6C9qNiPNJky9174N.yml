      - sort: 600000
        name: Chambre bleue
        type: text
        _id: VBAAInpRBKQcIg71
        system: {}
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: >-
            <p>La chambre de maître où s’est installé Oscar. La vue sur mer est
            à couper le souffle. Les murs sont recouverts d’une tapisserie
            anglaise bleue aux motifs végétaux. Le lit est métallique et peu
            confortable.</p><p>Une immense armoire normande occupe le mur ouest.
            Un étrange tableau signé par Ludovic est accroché en face du lit :
            il représente un labyrinthe unicursal (à un seul chemin) dont le
            centre est une serrure.</p>
        video:
          controls: true
          volume: 0.5
        src: null
        category: null
        flags: {}
        _stats:
          compendiumSource: null
          duplicateSource: null
