        type: text
        _id: ioVuNtktdopI59Vp
        system: {}
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: >-
            <p>Une petite salle de bain, aux carreaux et à la robinetterie
            d’époque.</p>
        video:
          controls: true
          volume: 0.5
        src: null
