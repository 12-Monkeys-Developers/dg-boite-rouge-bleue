        ownership:
          default: -1
      - sort: 800000
        name: Chambre verte
        type: text
        _id: nyH2rkYGTzHw6nM3
        system: {}
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: >-
            <p>Une chambre identique à la précédente. La tapisserie est cette
            fois vert pomme. Y sont stockées plusieurs dizaines de toiles,
            essentiellement (mais pas uniquement) des paysages marins.</p>
        video:
          controls: true
          volume: 0.5
        src: null
        category: null
        flags: {}
        _stats:
          compendiumSource: null
          duplicateSource: null
          exportSource: null
          coreVersion: '13.351'
          systemId: dangerousgary
          systemVersion: 1.1.1
          lastModifiedBy: null
        ownership:
          default: -1
      - sort: 900000
        name: Bureau et atelier
        type: text
        _id: mfYoc16VeiO6Zb9Y
        system: {}
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: >-
            <p>Un bureau que Ludovic avait transformé en atelier.</p><p>Le
            parquet est maculé de taches de peinture. Un bureau empire (qui vaut
            une petite fortune) est poussé le long du mur nord. Un grand album
            photo est rangé dans l’un des tiroirs. Des étagères croulent sous
            les pinceaux, les tubes de gouache et les revues. Plusieurs toiles
            sont posées le long des murs.</p>
        video:
          controls: true
          volume: 0.5
        src: null
        category: null
        flags: {}
        _stats:
          compendiumSource: null
          duplicateSource: null
          exportSource: null
