      - sort: 1300000
        name: La pièce secrète
        type: text
        _id: iFy4cNPa9rL4iFHp
        system: {}
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: >-
            <p> Un examen attentif de la cave de l’Albergo permet de découvrir
            une porte étroite, dissimulée par une imposante armoire à roulettes.
            Elle s’ouvre sur un petit bureau très encombré, d’à peine dix mètres
            carrés. Sur une table en bois sont posés un ordinateur portable, une
            imprimante et une pile de livres. Une vitrine vermoulue occupe le
            fond de la pièce. L’ensemble des murs sont recouverts de
            photographies gribouillées au feutre rouge.</p>
        video:
          controls: true
          volume: 0.5
        src: null
